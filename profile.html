<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — CashFlow</title>
<link rel="stylesheet" href="shared.css">
<style>
  .add-row { display: flex; gap: 8px; margin-top: 8px; }
  .add-row .input { flex: 1; min-width: 0; }
  .add-btn { flex-shrink: 0; padding: 0 16px; }
  .received-entry {
    background: var(--muted-bg); border-radius: var(--radius);
    padding: 10px 14px; margin-bottom: 6px;
  }
</style>
</head>
<body>

<header><h1>Profile</h1></header>

<div class="px-6" style="display:flex;flex-direction:column;gap:20px">

  <!-- Name Card -->
  <div class="card">
    <p class="text-sm text-muted mb-1">Name</p>
    <h2 style="font-family:var(--font-display);font-size:24px;font-weight:700">Durva</h2>
  </div>

  <!-- Money Received Card -->
  <div class="card">
    <p class="text-sm text-muted mb-1">Money Received</p>
    <p class="text-2xl text-success mb-3" id="prof-total">₹0.00</p>

    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input class="input" type="number" min="0" step="0.01" id="prof-amount" placeholder="Enter amount">
      <input class="input" id="prof-from" placeholder="Received from">
    </div>

    <div class="add-row">
      <input class="input" type="date" id="prof-date">
      <select class="input" id="prof-mode">
        <option value="cash">Cash</option>
        <option value="online">Online</option>
      </select>
      <button class="btn btn-primary add-btn" id="prof-add">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 12h8"/><path d="M12 8v8"/>
        </svg>
        Add
      </button>
    </div>

    <p class="error-msg" id="prof-error" style="display:none"></p>
  </div>

  <!-- Received Entries -->
  <div id="prof-entries"></div>

</div>

<div id="nav-placeholder"></div>

<script src="shared.js"></script>
<script>
  document.getElementById('nav-placeholder').innerHTML = bottomNav('profile');
  document.getElementById('prof-date').value = today();

  function render() {
    const total = state.received.reduce((s, e) => s + e.amount, 0);
    document.getElementById('prof-total').textContent = fmt(total);
    const el = document.getElementById('prof-entries');
    if (state.received.length === 0) { el.innerHTML = ''; return; }
    el.innerHTML = `<div class="card">
      <p class="text-sm text-muted mb-2">Added Amounts</p>
      ${state.received.map(e => `
        <div class="received-entry">
          <div class="row-between">
            <p class="font-semibold">+ ${fmt(e.amount)}</p>
            <button class="del-btn" onclick="del(${e.id})">${trashIcon()}</button>
          </div>
          <p class="text-xs text-muted mt-2">${e.received_from} · ${e.payment_mode} · ${e.received_on}</p>
        </div>`).join('')}
    </div>`;
  }

  function del(id) {
    state.received = state.received.filter(e => e.id !== id);
    saveState(); render();
  }

  document.getElementById('prof-add').addEventListener('click', () => {
    const amount = parseFloat(document.getElementById('prof-amount').value);
    const from   = document.getElementById('prof-from').value.trim();
    const date   = document.getElementById('prof-date').value || today();
    const mode   = document.getElementById('prof-mode').value;
    if (isNaN(amount) || amount <= 0) { showErr('prof-error', 'Please enter a valid amount.'); return; }
    if (!from) { showErr('prof-error', 'Please enter who gave you the money.'); return; }
    state.received.unshift({ id: nextId(state.received), amount, received_from: from, payment_mode: mode, received_on: date });
    saveState();
    document.getElementById('prof-amount').value = '';
    document.getElementById('prof-from').value = '';
    render();
  });

  render();
</script>
</body>
</html>
